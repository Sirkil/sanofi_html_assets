<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sanofi</title>
  <style>
    /* 1. Ensure the body takes up full height and centers content */
    body, html {
      margin: 0;
      padding: 0;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center; /* Centers horizontally */
      justify-content: flex-start; /* Starts from top */
    }

    /* 2. Mobile First: The flyer stays 100% width */
    .flyer {
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
    }

    .flyer img {
      width: 100%;
      height: auto;
      display: block;
      border: 0;
    }

    /* 3. New class to hold the buttons side-by-side */
    .button-group {
      display: flex;
      width: 100%;
    }

    .button-group a {
      width: 50%; /* Each button takes up half the width */
      display: block;
    }

    /* 4. Desktop Adjustment: Fill the canvas/screen width */
    @media screen and (min-width: 768px) {
      .flyer {
        width: 100vw; 
        max-width: 1200px;
      }
    }

    .unsubscribe-link {
      padding: 20px;
      text-align: center;
      font-family: sans-serif;
    }
  </style>
</head>
